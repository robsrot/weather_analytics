version: 2

models:
  - name: fct_city_weather_day
    description: Daily weather fact table with weather conditions and flags. One row per city per day.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - location_id
            - date
    columns:
      - name: weather_day_id
        description: Surrogate primary key generated from location_id and date.
        tests:
          - unique
          - not_null
      - name: location_id
        description: Foreign key to dim_location.
        tests:
          - not_null
          - relationships:
              to: ref('dim_location')
              field: location_id
      - name: city_name
        description: City name.
        tests:
          - not_null
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: country
        description: Full country name.
      - name: date
        description: Calendar date of the observation.
        tests:
          - not_null
      - name: temperature_2m_max
        description: Maximum air temperature at 2 m in degrees Celsius.
      - name: temperature_2m_min
        description: Minimum air temperature at 2 m in degrees Celsius.
      - name: temperature_2m_mean
        description: Mean air temperature at 2 m in degrees Celsius.
      - name: precipitation_sum
        description: Total precipitation in millimetres.
      - name: rain_sum
        description: Total rain in millimetres.
      - name: snowfall_sum
        description: Total snowfall in centimetres.
      - name: wind_speed_10m_max
        description: Maximum wind speed at 10 m in km/h.
      - name: is_extreme_heat
        description: True when daily maximum temperature exceeds 35 °C.
        tests:
          - not_null
      - name: is_heavy_rain
        description: True when total precipitation exceeds 20 mm.
        tests:
          - not_null
      - name: is_windy
        description: True when maximum wind speed exceeds 50 km/h.
        tests:
          - not_null
      - name: is_snow_day
        description: True when any snowfall is recorded.
        tests:
          - not_null
      - name: is_comfortable_day
        description: True when mean temp is 18–25 °C, precipitation under 5 mm, and max wind under 40 km/h.
        tests:
          - not_null
