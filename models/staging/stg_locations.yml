version: 2

models:
  - name: stg_locations
    description: City-level location metadata geocoded from the Open-Meteo Geocoding API. One row per city.
    columns:
      - name: location_id
        description: Primary key. Unique identifier returned by the Geocoding API.
        tests:
          - unique
          - not_null
      - name: city_name
        description: City name as returned by the Geocoding API.
        tests:
          - not_null
      - name: country
        description: Full country name.
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: admin1
        description: First-level administrative area such as a province or state.
      - name: latitude
        description: Latitude of the city in decimal degrees.
        tests:
          - not_null
      - name: longitude
        description: Longitude of the city in decimal degrees.
        tests:
          - not_null
      - name: timezone
        description: IANA timezone string for the city (e.g. Europe/Madrid).
      - name: elevation
        description: Elevation above sea level in metres.
      - name: population
        description: City population estimate.
      - name: extracted_at
        description: UTC timestamp when the record was extracted from the API.
        tests:
          - not_null
