version: 2

models:
  - name: stg_air_quality_hourly
    description: Hourly air quality observations per city from the Open-Meteo Air Quality API. One row per city per hour.
    columns:
      - name: location_id
        description: Foreign key to stg_locations.
        tests:
          - not_null
          - relationships:
              to: ref('stg_locations')
              field: location_id
      - name: city_name
        description: City name.
        tests:
          - not_null
      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: timestamp
        description: Local timestamp of the hourly observation.
        tests:
          - not_null
      - name: pm10
        description: PM10 particulate matter concentration in µg/m³.
      - name: pm2_5
        description: PM2.5 particulate matter concentration in µg/m³.
      - name: carbon_monoxide
        description: Carbon monoxide (CO) concentration in µg/m³.
      - name: nitrogen_dioxide
        description: Nitrogen dioxide (NO₂) concentration in µg/m³.
      - name: ozone
        description: Ozone (O₃) concentration in µg/m³.
      - name: european_aqi
        description: European Air Quality Index (0–500). Higher values indicate worse air quality.
      - name: extracted_at
        description: UTC timestamp when the data was extracted from the API.
        tests:
          - not_null
